version: "3.9"

networks:
  aggregator-net:
    driver: bridge

volumes:
  dedup-data:
    driver: local

services:
  aggregator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uts-aggregator
    ports:
      - "8080:8080"
    volumes:
      - dedup-data:/app/data
    networks:
      - aggregator-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1

  publisher:
    build:
      context: .
      dockerfile: Dockerfile.publisher
    container_name: uts-publisher
    depends_on:
      aggregator:
        condition: service_healthy
    networks:
      - aggregator-net
    environment:
      - AGGREGATOR_URL=http://aggregator:8080
      - PYTHONUNBUFFERED=1
    restart: "no"